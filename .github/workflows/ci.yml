name: CI

on:
  schedule:
    # Weekly notebook/render smoke to catch upstream toolchain drift.
    - cron: "21 9 * * 1"
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: python -m pytest

      - name: Run coverage gate
        if: matrix.python-version == '3.11'
        run: python -m pytest --cov=matrixlayout --cov-report=term-missing

  lint:
    name: Static quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install static quality dependencies
        run: python -m pip install -e .[dev]

      - name: Run ruff
        run: ruff check matrixlayout tests render_smoke.py

      - name: Run mypy on typed core
        run: python -m mypy matrixlayout/formatting.py matrixlayout/shortcascade.py matrixlayout/ge_grid.py matrixlayout/ge_template.py matrixlayout/ge_render_grid.py matrixlayout/ge_spec_merge.py matrixlayout/ge_labels.py matrixlayout/ge_decorations.py matrixlayout/qr_spec_merge.py matrixlayout/eigproblem_decorations.py matrixlayout/backsubst_helpers.py matrixlayout/specs.py

  package:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
          python -m pip install dist/*.whl

      - name: Verify packaged templates
        run: |
          cd /tmp
          python - <<'PY'
          from importlib.resources import files

          root = files("matrixlayout") / "templates"
          required = {"ge.tex.j2", "backsubst.tex.j2", "eigproblem.tex.j2"}
          present = {path.name for path in root.iterdir()}
          missing = required - present
          if missing:
              raise SystemExit(f"missing packaged templates: {sorted(missing)}")
          PY

  render-smoke:
    name: Render smoke - Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install TeX and SVG toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dvisvgm \
            fonts-lmodern \
            ghostscript \
            latexmk \
            pdf2svg \
            poppler-utils \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-pictures \
            texlive-plain-generic \
            texlive-science

      - name: Install render dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install git+https://github.com/ea42gh/jupyter-tikz.git@47ca7ea885075871631852eda1433a695260490a
          python -m pip install -e .[render]

      - name: Run render smoke
        run: python render_smoke.py

  notebook-smoke:
    name: Demo notebook smoke - Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install TeX and SVG toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dvisvgm \
            fonts-lmodern \
            ghostscript \
            latexmk \
            pdf2svg \
            poppler-utils \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-pictures \
            texlive-plain-generic \
            texlive-science

      - name: Install notebook dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install git+https://github.com/ea42gh/jupyter-tikz.git@47ca7ea885075871631852eda1433a695260490a
          python -m pip install -e .[render]
          python -m pip install ipykernel ipython nbconvert sympy
          python -m ipykernel install --user --name python3 --display-name "Python 3"

      - name: Execute demo notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute matrixlayout_demo.ipynb \
            --output /tmp/matrixlayout_demo.executed.ipynb \
            --ExecutePreprocessor.timeout=240
